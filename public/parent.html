<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeloGuard - Painel de Monitoramento Parental</title>
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
          <h1>ZeloGuard</h1>
        </div>
        <a href="index.html" class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 8px;">
          <i class="fa-solid fa-house"></i>
        </a>
      </div>

      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tab-devices" onclick="switchTab('devices')">Dispositivos</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Cadastrar Filho</button>
      </div>

      <div class="sidebar-content">
        <!-- Devices Tab -->
        <div id="panel-devices" class="tab-panel active">
          <div id="empty-state" class="empty-state">
            <i class="fa-solid fa-user-plus"></i>
            <p style="margin-top: 12px; font-weight: 600;">Nenhum dispositivo cadastrado</p>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 6px;">
              Clique na aba "Cadastrar Filho" para adicionar um dispositivo e iniciar o monitoramento.
            </p>
          </div>
          
          <div id="user-list" class="user-list">
            <!-- Dynamic User Cards will go here -->
          </div>
        </div>

        <!-- Register Tab -->
        <div id="panel-register" class="tab-panel">
          <form id="register-form" onsubmit="registerUser(event)">
            <div class="form-group">
              <label for="child-name">Nome do Filho</label>
              <input type="text" id="child-name" class="form-control" placeholder="Ex: Lucas, Sofia..." required>
            </div>

            <div class="form-group">
              <label>Cor do Marcador</label>
              <div style="display: flex; gap: 10px; margin-top: 8px;">
                <div class="color-dot-preset selected" data-color="#6366f1" style="background-color: #6366f1; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 0 2px #6366f1;"></div>
                <div class="color-dot-preset" data-color="#10b981" style="background-color: #10b981; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;"></div>
                <div class="color-dot-preset" data-color="#8b5cf6" style="background-color: #8b5cf6; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;"></div>
                <div class="color-dot-preset" data-color="#f43f5e" style="background-color: #f43f5e; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;"></div>
                <div class="color-dot-preset" data-color="#f59e0b" style="background-color: #f59e0b; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;"></div>
              </div>
              <input type="hidden" id="child-color" value="#6366f1">
            </div>

            <div class="form-group">
              <label>Escolha o Avatar</label>
              <div class="avatar-select">
                <div class="avatar-option selected" data-avatar="boy">
                  <span style="font-size: 24px;">👦</span>
                  <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">Menino</div>
                </div>
                <div class="avatar-option" data-avatar="girl">
                  <span style="font-size: 24px;">👧</span>
                  <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">Menina</div>
                </div>
                <div class="avatar-option" data-avatar="ninja">
                  <span style="font-size: 24px;">🥷</span>
                  <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">Ninja</div>
                </div>
                <div class="avatar-option" data-avatar="superhero">
                  <span style="font-size: 24px;">🦸</span>
                  <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">Super</div>
                </div>
              </div>
              <input type="hidden" id="child-avatar" value="boy">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">
              <i class="fa-solid fa-plus"></i> Cadastrar e Gerar Link
            </button>
          </form>
        </div>
      </div>
    </aside>

    <!-- Map Container -->
    <main class="map-container">
      <div id="map"></div>
      
      <!-- Floating Map HUD -->
      <div class="map-hud glass-panel">
        <span class="hud-title"><i class="fa-solid fa-circle" style="color: var(--accent-emerald); font-size: 0.6rem; animation: pulse-ring 1.5s infinite; margin-right: 6px;"></i> Monitoramento Ativo</span>
      </div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div class="toast" id="toast">Notificação</div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Socket.io Library -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Dashboard JS Logic -->
  <script src="js/parent.js"></script>
</body>
</html>
